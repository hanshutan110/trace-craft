name: TraceCraft CI

on:
  push:
  pull_request:

jobs:
  validate-backend:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: install backend
        run: npm install
      - name: syntax check
        run: node --check src/index.js

