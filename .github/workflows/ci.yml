# TraceCraft CI 工作流
#
# 触发条件：push 到 main/develop 或 PR
# 检查项目：TypeScript 类型检查 + 单元测试 + Docker 构建

name: TraceCraft CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ===== 后端检查 =====
  backend-check:
    name: Backend Typecheck & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # ===== 前端检查 =====
  frontend-check:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  # ===== Docker 构建 =====
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f Dockerfile.backend -t tracecraft-backend:ci .
      - name: Verify image
        run: |
          docker run --rm tracecraft-backend:ci node -e "console.log('backend image ok')"
