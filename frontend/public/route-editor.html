<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="format-detection" content="telephone=no" />
    <title>TraceCraft | 轨迹编辑页</title>
    <link rel="stylesheet" href="./tracecraft.css" />
  </head>
  <body>
    <div class="grain"></div>
    <main class="tc-shell">
      <header class="tc-topbar">
        <div class="tc-brand">
          <div class="tc-brand-mark">TC</div>
          <div>
            <h1 class="tc-brand-name">轨迹编辑页</h1>
            <p class="tc-brand-sub">自由编辑路径点并生成草稿</p>
          </div>
        </div>
        <a id="homeLink" class="tc-btn tc-btn-ghost" href="./index.html">首页</a>
      </header>

      <div class="tc-card">
        <h2 class="tc-section-title">路径点编辑</h2>
        <div class="tc-inline-actions">
          <button id="addPoint" class="tc-btn" type="button">添加节点</button>
          <button id="genRoute" class="tc-btn tc-btn-ghost" type="button">自动生成</button>
          <button id="clearPoints" class="tc-btn tc-btn-danger" type="button">清空路径</button>
        </div>

        <ul class="tc-list" id="pointList"></ul>
        <div class="tc-note" id="status">点数不足无法保存。</div>
        <div class="tc-actions">
          <input id="routeName" class="tc-input" placeholder="输入路线名称" value="自定义路径" style="flex:1;" />
          <button id="saveDraft" class="tc-btn" type="button">保存草稿</button>
        </div>
        <a id="toLoad" class="tc-btn tc-btn-ghost" href="./route-load.html">去加载页查看草稿</a>
      </div>
    </main>

    <script src="./tracecraft.js"></script>
    <script>
      const pointList = document.getElementById('pointList');
      const status = document.getElementById('status');
      const routeNameEl = document.getElementById('routeName');
      const state = {
        points: [],
      };

      function buildPoint(lat, lng) {
        return {
          id: `P-${Date.now()}-${Math.floor(Math.random() * 9999)}`,
          lat: Number(lat.toFixed(6)),
          lng: Number(lng.toFixed(6)),
          order: state.points.length + 1,
        };
      }

      function renderList() {
        pointList.innerHTML = '';
        state.points.forEach((pt, idx) => {
          const li = document.createElement('li');
          li.className = 'tc-list-item';
          const meta = document.createElement('span');
          meta.className = 'meta';
          meta.textContent = `${pt.lat.toFixed(5)}, ${pt.lng.toFixed(5)}`;
          li.innerHTML = `<b>点 ${idx + 1}</b><span class="meta">${pt.order}</span>`;
          li.appendChild(meta);

          const remove = document.createElement('button');
          remove.className = 'tc-btn tc-btn-danger';
          remove.style.padding = '4px 8px';
          remove.style.minHeight = '28px';
          remove.type = 'button';
          remove.textContent = '删除';
          remove.addEventListener('click', () => removePoint(idx));
          li.appendChild(remove);
          pointList.appendChild(li);
        });

        status.textContent = state.points.length ? `当前点数: ${state.points.length}` : '点数不足无法保存。';
      }

      function addPoint() {
        const baseLat = 31.24;
        const baseLng = 121.48;
        const offsetLat = (Math.random() - 0.5) * 0.01;
        const offsetLng = (Math.random() - 0.5) * 0.01;
        state.points.push(buildPoint(baseLat + offsetLat, baseLng + offsetLng));
        renderList();
      }

      function removePoint(index) {
        state.points.splice(index, 1);
        state.points.forEach((pt, idx) => pt.order = idx + 1);
        renderList();
      }

      function genRoute() {
        state.points = [];
        const steps = 6 + TC_DEMO.clampInt(Math.random() * 5, 0, 10, 6);
        for (let i = 0; i < steps; i++) {
          const p = 31.24 + i * 0.0007;
          const q = 121.48 + Math.sin(i / 2) * 0.001;
          state.points.push(buildPoint(p, q));
        }
        renderList();
      }

      function clearPoints() {
        state.points = [];
        renderList();
      }

      function saveDraft() {
        if (!state.points.length) {
          status.textContent = '请先添加至少 1 个路径点。';
          return;
        }

        const seed = TC_DEMO.getSeed();
        TC_DEMO.setRouteDraft({
          id: `route-${Date.now()}`,
          name: routeNameEl.value || '自定义路径',
          points: state.points,
          routeDistanceKm: seed.routeDistanceKm || TC_DEMO.DEFAULTS.routeDistanceKm,
          speedKmh: seed.speedKmh || TC_DEMO.DEFAULTS.speedKmh,
          templateId: seed.templateId || 'balanced-loop',
          shapeId: seed.shapeId || 'wave',
          from: 'editor',
        });
        window.location.href = './route-load.html?from=editor';
      }

      document.getElementById('addPoint').addEventListener('click', addPoint);
      document.getElementById('genRoute').addEventListener('click', genRoute);
      document.getElementById('clearPoints').addEventListener('click', clearPoints);
      document.getElementById('saveDraft').addEventListener('click', saveDraft);

      const draft = TC_DEMO.getRouteDraft();
      if (draft?.points?.length) {
        state.points = draft.points.slice(0, 24);
        routeNameEl.value = draft.name || '自定义路径';
      } else {
        genRoute();
      }

      renderList();
      TC_DEMO.initCommonLinks();
    </script>
  </body>
</html>
