<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="format-detection" content="telephone=no" />
    <title>TraceCraft | 实时导航</title>
    <link rel="stylesheet" href="./tracecraft.css" />
  </head>
  <body>
    <div class="grain"></div>
    <main class="tc-shell">
      <header class="tc-topbar">
        <div class="tc-brand">
          <div class="tc-brand-mark">TC</div>
          <div>
            <h1 class="tc-brand-name">实时导航</h1>
            <p class="tc-brand-sub">本地模拟导航引擎</p>
          </div>
        </div>
        <span class="tc-status" id="statusTag"><span class="tc-dot" id="statusDot"></span><span id="statusText">待启动</span></span>
      </header>

      <div class="tc-card">
        <h2 class="tc-section-title">导航参数</h2>
        <div class="tc-grid tc-grid-4">
          <div class="tc-kpi"><span>目标距离</span><b id="targetText">-- km</b></div>
          <div class="tc-kpi"><span>目标速度</span><b id="speedText">-- km/h</b></div>
          <div class="tc-kpi"><span>偏航</span><b id="deviationText">-- m</b></div>
          <div class="tc-kpi"><span>状态</span><b id="navStatus">待命</b></div>
        </div>
      </div>

      <div class="tc-card">
        <h2 class="tc-section-title">实时数据</h2>
        <div class="tc-grid tc-grid-4">
          <div class="tc-kpi"><span>已行进</span><b id="coveredText">0.00 km</b></div>
          <div class="tc-kpi"><span>剩余</span><b id="remainText">0.00 km</b></div>
          <div class="tc-kpi"><span>耗时</span><b id="elapsedText">00:00</b></div>
          <div class="tc-kpi"><span>速度估算</span><b id="paceText">0:00/km</b></div>
        </div>

        <div class="tc-progress"><span id="progressBar"></span></div>
        <div class="tc-map" id="mapWrap">
          <svg id="routeSvg" width="100%" height="100%" viewBox="0 0 320 180" preserveAspectRatio="none">
            <defs>
              <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#39f0cb" stop-opacity="1" />
                <stop offset="100%" stop-color="#6ee2ff" stop-opacity=".85" />
              </linearGradient>
            </defs>
            <rect width="320" height="180" fill="#07122a" />
            <g id="axis" stroke="rgba(255,255,255,.08)" stroke-width="0.8">
              <path d="M0 10H320" />
              <path d="M0 45H320" />
              <path d="M0 80H320" />
              <path d="M0 115H320" />
              <path d="M0 150H320" />
            </g>
            <g id="routeLayer"></g>
            <circle id="head" cx="35" cy="145" r="6" fill="#ffd9a7" stroke="#fff" stroke-width="2" />
            <circle id="headGlow" cx="35" cy="145" r="10" fill="rgba(255,217,167,.2)" />
            <text id="routeInfo" x="10" y="16" fill="#a9c2df" font-size="10" font-family="IBM Plex Mono, monospace">等待启动</text>
          </svg>
        </div>
      </div>

      <div class="tc-card">
        <h2 class="tc-section-title">控制</h2>
        <div class="tc-grid">
          <button id="startBtn" class="tc-btn" type="button">开始</button>
          <button id="pauseBtn" class="tc-btn tc-btn-ghost" type="button" disabled>暂停</button>
          <button id="resumeBtn" class="tc-btn tc-btn-ghost" type="button" disabled>继续</button>
          <button id="finishBtn" class="tc-btn tc-btn-danger" type="button" disabled>结束</button>
        </div>
        <div class="tc-inline-actions" style="margin-top:10px;">
          <button id="newRouteBtn" class="tc-btn tc-btn-ghost" type="button">新建路线</button>
          <button id="locBtn" class="tc-btn tc-btn-ghost" type="button">刷新定位（模拟）</button>
        </div>
        <div class="tc-note" id="coordText">当前未定位</div>
      </div>

      <div class="tc-card">
        <h2 class="tc-section-title">日志</h2>
        <div class="tc-log" id="log"></div>
      </div>

      <div class="tc-card">
        <h2 class="tc-section-title">跳转</h2>
        <div class="tc-actions">
          <a id="toHome" class="tc-btn tc-btn-ghost" href="./index.html">返回首页</a>
          <a id="toLoad" class="tc-btn tc-btn-ghost" href="./route-load.html">加载其他路线</a>
          <a id="toShare" class="tc-btn tc-btn-ghost" href="./share.html">去分享页</a>
          <a id="toComplete" class="tc-btn" href="./goal-complete.html">目标完成</a>
        </div>
      </div>
    </main>

    <script src="./tracecraft.js"></script>
    <script>
      const state = {
        status: 'idle',
        routeDistanceM: 3000,
        speedKmh: 8,
        coveredM: 0,
        deviationM: 0,
        elapsedSec: 0,
        paceSecPerKm: 0,
        routeId: '',
        sessionId: '',
        routePoints: [],
        timer: null,
        routeStartedAt: 0,
        tickMs: 1100,
        location: null,
      };

      const ui = {
        statusDot: document.getElementById('statusDot'),
        statusText: document.getElementById('statusText'),
        targetText: document.getElementById('targetText'),
        speedText: document.getElementById('speedText'),
        coveredText: document.getElementById('coveredText'),
        remainText: document.getElementById('remainText'),
        deviationText: document.getElementById('deviationText'),
        navStatus: document.getElementById('navStatus'),
        elapsedText: document.getElementById('elapsedText'),
        paceText: document.getElementById('paceText'),
        progressBar: document.getElementById('progressBar'),
        routeLayer: document.getElementById('routeLayer'),
        head: document.getElementById('head'),
        headGlow: document.getElementById('headGlow'),
        routeInfo: document.getElementById('routeInfo'),
        coordText: document.getElementById('coordText'),
        startBtn: document.getElementById('startBtn'),
        pauseBtn: document.getElementById('pauseBtn'),
        resumeBtn: document.getElementById('resumeBtn'),
        finishBtn: document.getElementById('finishBtn'),
        newRouteBtn: document.getElementById('newRouteBtn'),
        locBtn: document.getElementById('locBtn'),
        log: document.getElementById('log'),
        toHome: document.getElementById('toHome'),
        toLoad: document.getElementById('toLoad'),
        toShare: document.getElementById('toShare'),
        toComplete: document.getElementById('toComplete'),
      };

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function addLog(level, text) {
        const now = new Date().toLocaleTimeString('zh-CN', { hour12: false, minute: '2-digit', second: '2-digit' });
        const div = document.createElement('div');
        div.className = level;
        div.textContent = `[${now}] ${text}`;
        ui.log.prepend(div);
        if (ui.log.childNodes.length > 10) {
          ui.log.removeChild(ui.log.lastChild);
        }
      }

      function setStatus(status, online = false) {
        state.status = status;
        ui.navStatus.textContent = status;
        ui.statusText.textContent = online ? `连接${status}` : status;
        const running = status === '运行中';
        if (running) {
          ui.statusDot.className = 'tc-dot active';
        } else {
          ui.statusDot.className = 'tc-dot';
        }
      }

      function setControls({ start = false, pause = false, resume = false, finish = false, newRoute = false, loc = false }) {
        ui.startBtn.disabled = start;
        ui.pauseBtn.disabled = pause;
        ui.resumeBtn.disabled = resume;
        ui.finishBtn.disabled = finish;
        ui.newRouteBtn.disabled = newRoute;
        ui.locBtn.disabled = loc;
      }

      function fmtKm(m) {
        return `${(Math.max(0, m) / 1000).toFixed(2)} km`;
      }

      function fmtTime(s) {
        const sec = Math.max(0, Math.floor(s || 0));
        return `${String(Math.floor(sec / 60)).padStart(2, '0')}:${String(sec % 60).padStart(2, '0')}`;
      }

      function drawRoute(points) {
        while (ui.routeLayer.firstChild) {
          ui.routeLayer.removeChild(ui.routeLayer.firstChild);
        }
        if (!points.length) return;

        const d = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');

        const bg = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        bg.setAttribute('d', d);
        bg.setAttribute('fill', 'none');
        bg.setAttribute('stroke', 'rgba(255,255,255,.06)');
        bg.setAttribute('stroke-width', '7');
        bg.setAttribute('stroke-linecap', 'round');
        bg.setAttribute('stroke-linejoin', 'round');

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        line.setAttribute('d', d);
        line.setAttribute('fill', 'none');
        line.setAttribute('stroke', 'url(#rg)');
        line.setAttribute('stroke-width', '5');
        line.setAttribute('stroke-linecap', 'round');
        line.setAttribute('stroke-linejoin', 'round');

        ui.routeLayer.append(bg);
        ui.routeLayer.append(line);
      }

      function moveHead(progress) {
        if (!state.routePoints.length) return;
        const max = state.routePoints.length - 1;
        const p = clamp(progress, 0, 1) * max;
        const a = Math.floor(p);
        const b = Math.min(a + 1, max);
        const t = p - a;
        const p1 = state.routePoints[a];
        const p2 = state.routePoints[b];
        const x = p1.x + (p2.x - p1.x) * t;
        const y = p1.y + (p2.y - p1.y) * t;
        ui.head.setAttribute('cx', x);
        ui.head.setAttribute('cy', y);
        ui.headGlow.setAttribute('cx', x);
        ui.headGlow.setAttribute('cy', y);
      }

      function render() {
        const remainM = Math.max(0, state.routeDistanceM - state.coveredM);
        const ratio = state.routeDistanceM > 0 ? clamp(state.coveredM / state.routeDistanceM, 0, 1) : 0;

        ui.targetText.textContent = fmtKm(state.routeDistanceM);
        ui.speedText.textContent = `${state.speedKmh.toFixed(1)} km/h`;
        ui.coveredText.textContent = fmtKm(state.coveredM);
        ui.remainText.textContent = fmtKm(remainM);
        ui.deviationText.textContent = `${state.deviationM > 0 ? '+' : ''}${state.deviationM.toFixed(1)} m`;
        ui.elapsedText.textContent = fmtTime(state.elapsedSec);
        const pace = state.paceSecPerKm > 0 ? state.paceSecPerKm : 0;
        if (pace > 0) {
          const sec = Math.round(pace);
          ui.paceText.textContent = `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, '0')}/km`;
        } else {
          ui.paceText.textContent = '0:00/km';
        }

        ui.progressBar.style.width = `${Math.round(ratio * 100)}%`;
      }

      function syncLinks() {
        const payload = {
          routeId: state.routeId,
          session: state.sessionId,
          routeDistanceKm: state.routeDistanceM / 1000,
          actualDistanceKm: state.coveredM / 1000,
          durationSec: Math.round(state.elapsedSec),
          speedKmh: state.speedKmh,
          deviationM: state.deviationM,
          source: 'navigation',
        };
        const seed = TC_DEMO.getSeed();
        ui.toHome.href = TC_DEMO.buildHomeLink(seed);
        ui.toLoad.href = TC_DEMO.buildPageLink('/route-load.html', seed, {
          from: 'navigation',
        });
        ui.toShare.href = TC_DEMO.buildShareLink(payload);
        ui.toComplete.href = TC_DEMO.buildPageLink('/goal-complete.html', { ...seed, from: 'navigation' }, { distance: payload.routeDistanceKm.toFixed(2), covered: payload.actualDistanceKm.toFixed(2), duration: payload.durationSec, speed: payload.speedKmh, deviation: payload.deviationM, from: 'navigation', route: payload.routeId, session: payload.sessionId });
      }

      function generateDemoRoute() {
        const shape = TC_DEMO.getSeed().shapeId || 'wave';
        const d = state.routeDistanceM;
        const base = Math.max(24, Math.round(d / 110));
        const points = [];
        const freq = shape === 'spiral' ? 2.5 : (shape === 'step' ? 0.9 : 2.0);
        for (let i = 0; i <= base; i++) {
          const p = i / base;
          const x = 18 + 284 * p;
          const drift = Math.sin(p * Math.PI * 2.2 * freq) * (shape === 'step' ? 12 : 21);
          const rise = Math.cos(p * 8 * (shape === 'spiral' ? 1.4 : 1)) * (shape === 'wave' ? 9 : 6);
          const y = 155 - 30 * p - drift + rise;
          points.push({ x: clamp(x, 8, 312), y: clamp(y, 18, 166), p });
        }
        state.routePoints = points;
        drawRoute(points);
        moveHead(0);
        state.routeId = state.routeId || `route-${Date.now()}`;
        ui.routeInfo.textContent = `路线加载成功：${state.routeId}`;
      }

      function tick() {
        const speedMs = state.speedKmh * 1000 / 3600;
        const jitter = 1 + (Math.random() - 0.5) * 0.08;
        const dt = state.tickMs / 1000;
        const delta = speedMs * dt * jitter;
        state.elapsedSec += dt;
        state.coveredM = clamp(state.coveredM + delta, 0, state.routeDistanceM);
        state.deviationM = clamp(state.deviationM + (Math.random() - 0.5) * 1.2, -8, 8);
        state.paceSecPerKm = state.coveredM > 5 ? (state.elapsedSec / (state.coveredM / 1000)) : 0;

        const ratio = state.routeDistanceM > 0 ? state.coveredM / state.routeDistanceM : 0;
        moveHead(ratio);
        render();

        if (state.coveredM >= state.routeDistanceM) {
          finishRun(true);
        }
      }

      function startRun() {
        if (state.status === 'running') return;
        if (!state.routePoints.length) generateDemoRoute();
        state.status = 'running';
        setStatus('运行中', true);
        setControls({ start: true, pause: false, resume: true, finish: false, newRoute: true, loc: true });
        state.timer = setInterval(tick, state.tickMs);
        addLog('ok', '导航开始');
      }

      function pauseRun() {
        if (state.status !== 'running') return;
        if (state.timer) clearInterval(state.timer);
        state.status = 'paused';
        setStatus('暂停');
        setControls({ start: true, pause: false, resume: false, finish: false, newRoute: false, loc: true });
        addLog('warn', '已暂停');
      }

      function resumeRun() {
        if (state.status !== 'paused') return;
        state.status = 'running';
        setStatus('运行中', true);
        setControls({ start: true, pause: false, resume: true, finish: false, newRoute: true, loc: true });
        state.timer = setInterval(tick, state.tickMs);
        addLog('ok', '继续运行');
      }

      function finishRun(auto) {
        if (state.status === 'finished') return;
        if (state.timer) clearInterval(state.timer);
        state.status = 'finished';
        setStatus(auto ? '已完成' : '已结束');
        setControls({ start: false, pause: true, resume: true, finish: true, newRoute: false, loc: false });

        const payload = {
          routeId: state.routeId || `route-${Date.now()}`,
          sessionId: state.sessionId || `session-${Date.now()}`,
          routeDistanceKm: Number((state.routeDistanceM / 1000).toFixed(2)),
          actualDistanceKm: Number((state.coveredM / 1000).toFixed(2)),
          durationSec: Math.round(state.elapsedSec),
          speedKmh: Number(state.speedKmh.toFixed(1)),
          deviationM: Number(state.deviationM.toFixed(1)),
          from: 'navigation',
          source: 'simulation',
        };

        TC_DEMO.setLastSession(payload);
        TC_DEMO.setRuntimeSummary(payload);
        syncLinks();
        addLog('ok', `导航结束：目标 ${payload.routeDistanceKm}km，实际 ${payload.actualDistanceKm}km`);
      }

      function resetRun() {
        const seed = TC_DEMO.getSeed();
        state.routeDistanceM = clamp(seed.routeDistanceKm, 0.3, 20, TC_DEMO.DEFAULTS.routeDistanceKm) * 1000;
        state.speedKmh = clamp(seed.speedKmh, 2, 20, TC_DEMO.DEFAULTS.speedKmh);
        state.coveredM = 0;
        state.deviationM = 0;
        state.elapsedSec = 0;
        state.paceSecPerKm = 0;
        state.sessionId = '';
        if (state.timer) clearInterval(state.timer);
        state.status = 'idle';
        generateDemoRoute();
        render();
        setStatus('待命');
        setControls({ start: false, pause: true, resume: true, finish: true, newRoute: false, loc: false });
        syncLinks();
      }

      function mockLocation() {
        const lat = (31.23 + Math.random() * 0.02).toFixed(6);
        const lng = (121.47 + Math.random() * 0.02).toFixed(6);
        state.location = { lat, lng, acc: Math.round(8 + Math.random() * 4) };
        ui.coordText.textContent = `定位 ${lat}, ${lng} (±${state.location.acc}m)`;
        addLog('ok', `定位更新 ${lat}, ${lng}`);
      }

      const seed = TC_DEMO.getSeed();
      state.routeDistanceM = clamp(seed.routeDistanceKm, 0.3, 20, TC_DEMO.DEFAULTS.routeDistanceKm) * 1000;
      state.speedKmh = clamp(seed.speedKmh, 2, 20, TC_DEMO.DEFAULTS.speedKmh);
      state.routeId = seed.routeId || `route-${Date.now()}`;

      generateDemoRoute();
      render();
      resetRun();
      setStatus('待命');
      setControls({ start: false, pause: true, resume: true, finish: true, newRoute: true, loc: false });

      ui.startBtn.addEventListener('click', startRun);
      ui.pauseBtn.addEventListener('click', pauseRun);
      ui.resumeBtn.addEventListener('click', resumeRun);
      ui.finishBtn.addEventListener('click', () => finishRun(false));
      ui.newRouteBtn.addEventListener('click', () => {
        const seed = TC_DEMO.getSeed();
        TC_DEMO.setSeed({
          ...seed,
          routeDistanceKm: state.routeDistanceM / 1000,
          speedKmh: state.speedKmh,
          from: 'navigation',
          source: 'new-route',
        });
        resetRun();
        addLog('warn', '已重置路线');
      });
      ui.locBtn.addEventListener('click', mockLocation);
      document.getElementById('toShare').addEventListener('click', syncLinks);
      ui.toComplete.addEventListener('click', syncLinks);
      TC_DEMO.initCommonLinks();
      syncLinks();
    </script>
  </body>
</html>
